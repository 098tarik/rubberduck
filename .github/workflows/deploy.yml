name: Build and Deploy RubberDuck

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Setup Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}

      - name: Deploy to K3s
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USER }}
          key: ${{ secrets.PI_SSH_KEY }}
          script: |
            cat <<'EOF' >/tmp/rubberduck-deployment.yaml
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: rubberduck
              labels:
                app: rubberduck
            spec:
              replicas: 1
              selector:
                matchLabels:
                  app: rubberduck
              template:
                metadata:
                  labels:
                    app: rubberduck
                spec:
                  hostNetwork: true
                  containers:
                    - name: rubberduck
                      image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
                      imagePullPolicy: Always
                      ports:
                        - containerPort: 8000
                      env:
                        - name: OLLAMA_URL
                          value: "http://127.0.0.1:11434"
                        - name: OLLAMA_MODEL
                          value: "deepseek-r1:8b"
            ---
            apiVersion: v1
            kind: Service
            metadata:
              name: rubberduck
            spec:
              selector:
                app: rubberduck
              ports:
                - port: 80
                  targetPort: 8000
            ---
            apiVersion: networking.k8s.io/v1
            kind: Ingress
            metadata:
              name: rubberduck
            spec:
              rules:
                - host: rubberduck.local
                  http:
                    paths:
                      - path: /
                        pathType: Prefix
                        backend:
                          service:
                            name: rubberduck
                            port:
                              number: 80
            EOF
            sudo k3s kubectl apply -f /tmp/rubberduck-deployment.yaml
            sudo k3s kubectl rollout restart deployment/rubberduck