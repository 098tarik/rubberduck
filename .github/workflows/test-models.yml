name: Test Ollama Models (Production)

on:
  schedule:
    # 9am PST = 17:00 UTC
    - cron: "0 17 * * *"
  workflow_dispatch:

jobs:
  test-models:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install ".[dev]"

      - name: Run unit tests
        run: pytest tests/ --ignore=tests/test_ollama_models.py -v

      - name: Run Ollama model tests
        env:
          OLLAMA_URL: ${{ secrets.OLLAMA_URL }}
        run: pytest tests/test_ollama_models.py -v
